    .panel {

    .label { font-size:12px; font-weight:800; margin-bottom:8px; color:#374151; }
    .chips { display:flex; gap:6px; flex-wrap:wrap; }
    .chip { display:inline-flex; align-items:center; gap:6px; font-size:12px; border:1px solid #e5e7eb; border-radius:999px; padding:6px 10px; background:#fff; }
    .chip input { margin:0; }
    .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    button {
      border:1px solid #d1d5db; border-radius:10px; background:white; padding:8px 10px; font-size:12px; font-weight:700; cursor:pointer;
    }
    button:hover { background:#f9fafb; }
    input[type=text] {
      width:100%; box-sizing:border-box; border:1px solid #d1d5db; border-radius:10px; padding:9px 10px; font-size:13px;
    }
    .status { font-size:12px; line-height:1.55; white-space:pre-line; }
    .small { font-size:11px; color:#6b7280; line-height:1.5; }
    .list { max-height:180px; overflow:auto; background:#fff; border:1px solid #e5e7eb; border-radius:12px; }
    .item { padding:8px 10px; border-bottom:1px solid #f3f4f6; font-size:12px; line-height:1.5; }
    .item:last-child { border-bottom:none; }
    .badge {
      display:inline-block; font-size:11px; font-weight:800; border-radius:999px; padding:2px 7px; color:white; margin-right:4px;

    .muted { color:#6b7280; }
    .legend {

      </div>

      <div class="box">
        <div class="label">현재 보이는 학교</div>
        <div class="list" id="visibleList"></div>
      </div>

      <div class="box">
        <div class="label">위치 미확인</div>
        <div class="list" id="missingList"></div>
      </div>
    </div>
  </div>

    const groupOrder = ["N1","N2","N3","N4","N5"];
    const cityOrder = ["서울","인천","수원","성남","안양","고양","부천"];
    const groupColors = { N1:"#2563eb", N2:"#16a34a", N3:"#f59e0b", N4:"#dc2626", N5:"#7c3aed" };
    const areaNameByCity = {
      "서울":"서울특별시", "인천":"인천광역시", "수원":"수원시",
      "성남":"성남시", "안양":"안양시", "고양":"고양시", "부천":"부천시"
    };

    const map = L.map("map", { preferCanvas:true }).setView([37.47, 126.98], 10);
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const state = {
      groupFilter: Object.fromEntries(groupOrder.map(g => [g, true])),
      cityFilter: Object.fromEntries(cityOrder.map(c => [c, true])),
      searchText: "",
      markers: new Map(),
      missing: new Map(),
      loading: false
    };

    const CACHE_KEY = "school_map_coords_v3";
    let cache = {};
    try { cache = JSON.parse(localStorage.getItem(CACHE_KEY) || "{}"); } catch (e) { cache = {}; }

    const groupFiltersEl = document.getElementById("groupFilters");
    const cityFiltersEl = document.getElementById("cityFilters");
    const statusBox = document.getElementById("statusBox");
    const visibleList = document.getElementById("visibleList");
    const missingList = document.getElementById("missingList");
    const searchInput = document.getElementById("searchInput");

    function keyOf(item) {
      return `${item.city}|${item.group}|${item.name}|${item.district}`;
    }

    function badge(group) {
      return `<span class="badge" style="background:${groupColors[group]}">${group}</span>`;
    }

    function esc(text) {
      return String(text).replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
    }

    function visibleByFilters(item) {
      const q = state.searchText.trim().toLowerCase();
      const hay = `${item.city} ${item.group} ${item.name} ${item.district}`.toLowerCase();
      return !!state.groupFilter[item.group] && !!state.cityFilter[item.city] && (!q || hay.includes(q));
    }

    function markerStyle(item, highlighted=false) {
      return {
        radius: highlighted ? 9 : 7,
        color: groupColors[item.group],
        weight: highlighted ? 3 : 2,
        fillColor: groupColors[item.group],
        fillOpacity: highlighted ? 0.5 : 0.25
      };
    }

    function popupHtml(item, lat, lon, source) {
      const q = encodeURIComponent((item.manualAddress || `${item.name} ${item.city}`).trim());
      return `
        <div class="popup-title">${esc(item.name)}</div>
        <div>${badge(item.group)} ${esc(item.city)} / ${esc(item.district)}</div>
        <div><b>좌표</b> ${lat.toFixed(6)}, ${lon.toFixed(6)}</div>
        <div class="muted"><b>위치 확인</b> ${esc(source)}</div>
        <div style="margin-top:6px;"><a href="https://map.naver.com/p/search/${q}" target="_blank" rel="noopener noreferrer">네이버지도 검색</a></div>
      `;
    }

    function addMarker(item, lat, lon, source) {
      const key = keyOf(item);
      if (state.markers.has(key)) return;
      const marker = L.circleMarker([lat, lon], markerStyle(item));
      marker._item = item;
      marker._lat = lat;
      marker._lon = lon;
      marker.bindPopup(popupHtml(item, lat, lon, source), {maxWidth:280});
      state.markers.set(key, marker);
      if (visibleByFilters(item)) marker.addTo(map);
    }

    function removeAllVisibleMarkers() {
      state.markers.forEach(marker => { if (map.hasLayer(marker)) map.removeLayer(marker); });
    }

    function applyFilters() {
      state.markers.forEach(marker => {
        const show = visibleByFilters(marker._item);
        if (show && !map.hasLayer(marker)) marker.addTo(map);
        if (!show && map.hasLayer(marker)) map.removeLayer(marker);
        marker.setStyle(markerStyle(marker._item, !!state.searchText.trim() && show));
      });
      renderVisibleList();
    }

    function renderVisibleList() {
      const items = schools.filter(visibleByFilters).sort((a,b) =>
        a.group.localeCompare(b.group) || a.city.localeCompare(b.city) || a.name.localeCompare(b.name)
      );
      if (!items.length) {
        visibleList.innerHTML = '<div class="item">현재 조건에 맞는 학교가 없습니다.</div>';
        return;
      }
      visibleList.innerHTML = items.map(item => {
        const located = state.markers.has(keyOf(item));
        return `<div class="item">${badge(item.group)} <b>${esc(item.name)}</b><br><span class="muted">${esc(item.city)} / ${esc(item.district)} · ${located ? "위치 있음" : "위치 확인 중/없음"}</span></div>`;
      }).join("");
    }

    function renderMissingList() {
      const vals = [...state.missing.values()];
      if (!vals.length) {
        missingList.innerHTML = '<div class="item">없음</div>';
        return;
      }
      missingList.innerHTML = vals.map(item => `<div class="item">${badge(item.group)} <b>${esc(item.name)}</b><br><span class="muted">${esc(item.city)} / ${esc(item.district)}</span>${item.manualAddress ? `<br><span class="muted">${esc(item.manualAddress)}</span>` : ""}</div>`).join("");
    }
    function updateStatus(text) { statusBox.textContent = text; }

    function aliasQueries(item) {
      return [
        item.manualAddress,
        item.name + " " + item.city + " " + item.district + " 대한민국",
        item.name + " " + item.city + " 대한민국",
        item.fallbackName ? item.fallbackName + " " + item.city + " 대한민국" : null
      ].filter(Boolean);
    }

    async function fetchOverpassBatch(items, city) {
      const names = [...new Set(items.flatMap(item => [item.name, item.fallbackName].filter(Boolean)))];
      const lookup = names.flatMap(name => [
        `node(area.searchArea)["name"="${name}"];`,
        `way(area.searchArea)["name"="${name}"];`,
        `relation(area.searchArea)["name"="${name}"];`
      ]).join("\n");
      const query = `
[out:json][timeout:60];
area["boundary"="administrative"]["name"="${areaNameByCity[city]}"]->.searchArea;
(
${lookup}
);
out center tags;
      `.trim();
      const res = await fetch("https://overpass-api.de/api/interpreter", {
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=UTF-8"},
        body: query
      });
      if (!res.ok) throw new Error("overpass");
      const data = await res.json();
      const buckets = new Map();
      (data.elements || []).forEach(el => {
        const name = el.tags && el.tags.name;
        const lat = el.lat ?? (el.center && el.center.lat);
        const lon = el.lon ?? (el.center && el.center.lon);
        if (!name || typeof lat !== "number" || typeof lon !== "number") return;
        if (!buckets.has(name)) buckets.set(name, []);
        buckets.get(name).push({ lat, lon, tags: el.tags || {} });
      });
      return buckets;
    }

    function scoreCandidate(item, alias, cand) {
      let score = 0;
      if (alias === item.name) score += 100;
      if (cand.tags.amenity === "school" || cand.tags.building === "school") score += 25;
      if (cand.tags.amenity === "university") score += 15;
      const joined = Object.values(cand.tags).join(" ");
      if (item.city && joined.includes(item.city)) score += 6;
      if (item.district && joined.includes(item.district)) score += 8;
      if (item.manualAddress && joined.includes(item.manualAddress.split(" ").slice(-1)[0])) score += 4;
      return score;
    }

    async function fetchNominatim(item) {
      for (const q of aliasQueries(item)) {
        try {
          const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&countrycodes=kr&limit=1&accept-language=ko&q=${encodeURIComponent(q)}`;
          const res = await fetch(url);
          if (!res.ok) continue;
          const data = await res.json();
          if (Array.isArray(data) && data.length) {
            return { lat:Number(data[0].lat), lon:Number(data[0].lon), source:item.manualAddress === q ? "수동 주소 검색" : "이름 검색" };
          }
        } catch (e) {}
        await new Promise(r => setTimeout(r, 700));
      }
      return null;
    }

    async function loadVisibleSchools() {
      if (state.loading) return;
      const targets = schools;
      if (!targets.length) {
        updateStatus("불러올 학교가 없습니다.");
        return;
      }

      state.loading = true;
      state.missing.clear();

      let loadedFromCache = 0;
      for (const item of targets) {
        const key = keyOf(item);
        const cached = cache[key];
        if (cached && typeof cached.lat === "number" && typeof cached.lon === "number") {
          addMarker(item, cached.lat, cached.lon, cached.source || "캐시");
          loadedFromCache += 1;
        }
      }
      applyFilters();
      updateStatus(`대상 ${targets.length}개 중 캐시 ${loadedFromCache}개 적용. 나머지 위치를 찾는 중…`);

      const cityMap = new Map();
      targets.filter(item => !state.markers.has(keyOf(item))).forEach(item => {
        if (!cityMap.has(item.city)) cityMap.set(item.city, []);
        cityMap.get(item.city).push(item);
      });

      let processed = loadedFromCache;
      for (const [city, items] of cityMap.entries()) {
        let bucket = new Map();
        try {
          bucket = await fetchOverpassBatch(items, city);
        } catch (e) {}

        for (const item of items) {
          let best = null;
          for (const alias of [item.name, item.fallbackName].filter(Boolean)) {
            const candidates = bucket.get(alias) || [];
            for (const cand of candidates) {
              const score = scoreCandidate(item, alias, cand);
              if (!best || score > best.score) best = {...cand, score, source:"지도 이름 매칭"};
            }
          }

          if (!best) best = await fetchNominatim(item);

          if (best && Number.isFinite(best.lat) && Number.isFinite(best.lon)) {
            addMarker(item, best.lat, best.lon, best.source || "자동");
            cache[keyOf(item)] = { lat: best.lat, lon: best.lon, source: best.source || "자동" };
            try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch (e) {}
          } else {
            state.missing.set(keyOf(item), item);
          }

          processed += 1;
          updateStatus(`위치 확인 중… ${processed} / ${targets.length}`);
          applyFilters();
          renderMissingList();
        }
      }

      state.loading = false;
      const located = schools.filter(item => state.markers.has(keyOf(item))).length;
      updateStatus(`완료. 현재 좌표 저장됨: ${located}개 / 이번 조회 대상: ${targets.length}개 / 미확인: ${state.missing.size}개`);
      renderMissingList();
      applyFilters();
      const pts = [];
      state.markers.forEach(marker => { pts.push([marker._lat, marker._lon]); });
      if (pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.15));
    }

    function buildFilters() {
      groupOrder.forEach(group => {
        const count = schools.filter(s => s.group === group).length;
        const label = document.createElement("label");
        label.className = "chip";
        label.innerHTML = `<input type="checkbox" data-kind="group" data-value="${group}" checked><span class="dot" style="background:${groupColors[group]}"></span><span>${group} (${count})</span>`;
        groupFiltersEl.appendChild(label);
      });
      cityOrder.forEach(city => {
        const count = schools.filter(s => s.city === city).length;
        const label = document.createElement("label");
        label.className = "chip";
        label.innerHTML = `<input type="checkbox" data-kind="city" data-value="${city}" checked><span>${city} (${count})</span>`;
        cityFiltersEl.appendChild(label);
      });

      document.querySelectorAll('input[data-kind="group"]').forEach(el => el.addEventListener("change", e => {
        state.groupFilter[e.target.dataset.value] = e.target.checked; applyFilters();
      }));
      document.querySelectorAll('input[data-kind="city"]').forEach(el => el.addEventListener("change", e => {
        state.cityFilter[e.target.dataset.value] = e.target.checked; applyFilters();
      }));
    }

    buildFilters();
    renderVisibleList();
    renderMissingList();

    searchInput.addEventListener("input", e => {
      state.searchText = e.target.value || "";
      applyFilters();
    });

    document.getElementById("selectAllBtn").addEventListener("click", () => {
      document.querySelectorAll('input[data-kind="group"], input[data-kind="city"]').forEach(el => {
        el.checked = true;
        if (el.dataset.kind === "group") state.groupFilter[el.dataset.value] = true;
        if (el.dataset.kind === "city") state.cityFilter[el.dataset.value] = true;
      });
      applyFilters();
    });
    document.getElementById("hideAllBtn").addEventListener("click", () => {
      document.querySelectorAll('input[data-kind="group"], input[data-kind="city"]').forEach(el => {
        el.checked = false;
        if (el.dataset.kind === "group") state.groupFilter[el.dataset.value] = false;
        if (el.dataset.kind === "city") state.cityFilter[el.dataset.value] = false;
      });
      applyFilters();
    });

    updateStatus("학교 위치를 불러오는 중입니다.");
    loadVisibleSchools();
  </script>
